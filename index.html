    <!-- Custom JavaScript for dark mode toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Get elements
            const darkModeToggle = document.getElementById('darkModeToggle');

            // Check dark mode preference from local storage
            const darkModeEnabled = localStorage.getItem('darkMode') === 'enabled';

            // Set initial state based on preference
            setDarkMode(darkModeEnabled);

            // Toggle dark mode on button click
            darkModeToggle.addEventListener('click', function () {
                const newDarkMode = document.body.classList.contains('dark-mode') ? false : true;
                setDarkMode(newDarkMode);
            });

            // Function to set dark mode
            function setDarkMode(enable) {
                if (enable) {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('darkMode', 'enabled');
                } else {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('darkMode', 'disabled');
                }
                updateStyles(enable);
            }

            // Function to update additional styles
            function updateStyles(isDarkMode) {
                const logo = document.querySelector('.logo');
                const logoPath = isDarkMode ? 'Ass/images/logo-no-background.svg' : 'Ass/images/logo-no-background.svg';
                logo.setAttribute('src', logoPath);

                // Toggle sun and moon icons
                const sunIcon = document.getElementById('sunIcon');
                const moonIcon = document.getElementById('moonIcon');
                
                if (isDarkMode) {
                    sunIcon.style.display = 'none'; // Hide sun in dark mode
                    moonIcon.style.display = 'inline'; // Show moon in dark mode
                } else {
                    sunIcon.style.display = 'inline'; // Show sun in light mode
                    moonIcon.style.display = 'none'; // Hide moon in light mode
                }
            }
        });
    </script>
