<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>DJ Rangas</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <style>
        body{background:#808080;color:#fff;transition:background 0.3s,color 0.3s;margin-bottom:60px;}.logo{width:300px;margin-bottom:20px;transition:filter 0.3s;}
        #contact a{color:#fff;}.dark-mode #contact a{color:#000;}.dark-mode{background:#fff;color:#000;}.dark-mode .logo{filter:invert(1);}.dark-mode a{color:#bbb;}.dark-mode .social-icons a{color:#000 !important;}
        #darkModeToggle{position:fixed;bottom:10px;right:10px;z-index:1000;}.modal-content{background:#333;color:#fff;}.youtube-subscribe-btn{display:flex;justify-content:center;align-items:center;margin-top:20px;}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html">DJ Rangas</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            </ul>
        </div>
    </nav>
    <div class="container mt-5 text-center d-flex align-items-center flex-column">
        <img src="Ass/images/logo-no-background.svg" alt="DJ Rangas Logo" class="mx-auto d-block logo">
        <h1>Welcome to DJ Rangas</h1>
        <section id="contact" class="mt-5">
            <h2>Contact</h2>
            <p>Connect with me on social media:</p>
            <div class="social-icons">
                <a href="https://github.com/djrangas" target="_blank" class="text-white mr-3"><i class="fab fa-github fa-2x"></i></a>
                <a href="https://www.youtube.com/channel/UC0ySu3qAEVxpajftdl3QjuQ" target="_blank" class="text-white mr-3"><i class="fab fa-youtube fa-2x"></i></a>
                <a href="https://www.instagram.com/djrangas/" target="_blank" class="text-white mr-3"><i class="fab fa-instagram fa-2x"></i></a>
                <a href="https://www.facebook.com/profile.php?id=61550626917829" target="_blank" class="text-white mr-3"><i class="fab fa-facebook-f fa-2x"></i></a>
                <a href="https://soundcloud.com/djrangas-000000?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" target="_blank" class="text-white"><i class="fab fa-soundcloud fa-2x"></i></a>
            </div>
            <hr>
            <p>Email: <a href="mailto:htooaunklinn12@gmail.com"><i class="fas fa-envelope"></i> Send Mail</a></p>
            <p>Phone: +959974448285</p>
        </section>
    </div>
    <button id="darkModeToggle" class="btn btn-secondary mb-3">
        <i id="sunIcon" class="fas fa-sun"></i><i id="moonIcon" class="fas fa-moon"></i>
    </button>
    <div class="modal fade" id="subscribeModal" tabindex="-1" role="dialog" aria-labelledby="subscribeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="subscribeModalLabel">Support Me</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body text-center">
                    <p>Subscribe to my YouTube channel for the latest updates and videos!</p>
                    <button type="button" class="btn btn-danger mt-3" onclick="window.location.href='https://www.youtube.com/channel/UC0ySu3qAEVxpajftdl3QjuQ';">Go to YouTube</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://apis.google.com/js/platform.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const darkModeToggle = document.getElementById('darkModeToggle');
            const subscribeModal = new bootstrap.Modal(document.getElementById('subscribeModal'));
            const darkModeEnabled = localStorage.getItem('darkMode') === 'enabled';
            setDarkMode(darkModeEnabled);
            darkModeToggle.addEventListener('click', function () {
                const newDarkMode = document.body.classList.contains('dark-mode') ? false : true;
                setDarkMode(newDarkMode);
            });
            subscribeModal.show();
            function setDarkMode(enable) {
                if (enable) {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('darkMode', 'enabled');
                } else {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('darkMode', 'disabled');
                }
                updateStyles(enable);
            }
            function updateStyles(isDarkMode) {
                const logo = document.querySelector('.logo');
                const logoPath = isDarkMode ? 'Ass/images/logo-no-background.svg' : 'Ass/images/logo-no-background.svg';
                logo.setAttribute('src', logoPath);
                const sunIcon = document.getElementById('sunIcon');
                const moonIcon = document.getElementById('moonIcon');
                if (isDarkMode) {
                    sunIcon.style.display = 'none';
                    moonIcon.style.display = 'inline';
                } else {
                    sunIcon.style.display = 'inline';
                    moonIcon.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
