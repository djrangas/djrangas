<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>DJ Rangas - About</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <style>
        body{background-color:#808080;color:#fff;transition:background-color 0.3s,color 0.3s;margin-bottom:60px;}
        #contact a{color:#fff;}.dark-mode #contact a{color:#000;}.dark-mode{background-color:#fff;color:#000;}.dark-mode a{color:#bbb;}.dark-mode .social-icons a{color:#000 !important;}
        #darkModeToggle{position:fixed;bottom:10px;right:10px;z-index:1000;}.about-content{margin-top:40px;text-align:justify;}.popup-content{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);padding:20px;background-color:#333;color:#fff;z-index:1001;}
        .close-btn{position:absolute;top:10px;right:10px;background:none;border:none;font-size:24px;color:#fff;cursor:pointer;}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html">DJ Rangas</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="#">About</a></li>
            </ul>
        </div>
    </nav>
    <div class="container mt-5 text-center d-flex align-items-center flex-column">
        <section id="about" class="about-content">
            <h1>About DJ Rangas</h1>
            <p>Nothing here...</p>
            <button id="learnMoreBtn" class="btn-secondary">Learn More</button>
        </section>
    </div>
    <button id="darkModeToggle" class="btn btn-secondary mb-3">
        <i id="sunIcon" class="fas fa-sun"></i><i id="moonIcon" class="fas fa-moon"></i>
    </button>
    <div id="aboutPopup" class="popup-content">
        <h3>More About DJ Rangas</h3>
        <p>[Include additional details about the artist here. This could be a more in-depth biography, discography, upcoming projects, etc.]</p>
        <button class="close-btn" onclick="closePopup()">&times;</button>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const darkModeToggle = document.getElementById('darkModeToggle');
            const aboutPopup = document.getElementById('aboutPopup');
            const darkModeEnabled = localStorage.getItem('darkMode') === 'enabled';
            setDarkMode(darkModeEnabled);
            darkModeToggle.addEventListener('click', function () {
                const newDarkMode = document.body.classList.contains('dark-mode') ? false : true;
                setDarkMode(newDarkMode);
            });
            function setDarkMode(enable) {
                if (enable) {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('darkMode', 'enabled');
                } else {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('darkMode', 'disabled');
                }
                updateStyles(enable);
            }
            function updateStyles(isDarkMode) {
                const sunIcon = document.getElementById('sunIcon');
                const moonIcon = document.getElementById('moonIcon');
                if (isDarkMode) {
                    sunIcon.style.display = 'none';
                    moonIcon.style.display = 'inline';
                } else {
                    sunIcon.style.display = 'inline';
                    moonIcon.style.display = 'none';
                }
            }
            document.getElementById('learnMoreBtn').addEventListener('click', function () {
                aboutPopup.style.display = 'block';
            });
            window.closePopup = function() {
                aboutPopup.style.display = 'none';
            };
        });
    </script>
</body>
</html>
